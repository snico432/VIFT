# @package _global_

# CrossAttnPoseTransformer: IMU cross-attends to visual, ffn_cross, then IMU self-attn + FFN.
# To run:
#   python src/train.py experiment=cross_attn_extra_ffn

defaults:
  - override /data: latent_kitti_vio
  - override /model: cross_attn_latent_vio_tf
  - override /callbacks: default
  - override /trainer: default

tags: ["latent_kitti_vio", "weighted", "Manifold", "transformer", "cross-attention"]

seed: 42

trainer:
  min_epochs: 20
  max_epochs: 200
  log_every_n_steps: 1

data:
  batch_size: 128
  train_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/train_10
  val_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/val_10
  test_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/val_10

model:
  plot_label: "CA+FFN"
  net:
    _target_: src.models.components.pose_transformer.CrossAttnPoseTransformer
    input_dim: 768
    embedding_dim: 512
    num_layers: 4
    nhead: 8
    dim_feedforward: 1024
    dropout: 0.0
