# @package _global_

defaults:
  - override /data: latent_kitti_vio
  - override /model: visual_context_cross_attn
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["latent_kitti_vio", "weighted", "Manifold", "transformer", "cross-attention", "visual-context"]

seed: 42

trainer:
  min_epochs: 20
  max_epochs: 200
  log_every_n_steps: 1

data:
  batch_size: 128
  train_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/train_10
  val_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/val_10
  test_loader:
    root_dir: ${paths.data_dir}/kitti_latent_data/val_10